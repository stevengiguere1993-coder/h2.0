<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Horizon h2.0 Helper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 340px;
      padding: 16px;
      margin: 0;
      background: #f5f5f5;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #2c5530;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
      margin-bottom: 4px;
      color: #555;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
      font-family: monospace;
    }
    button {
      margin-top: 12px;
      padding: 8px 14px;
      background: #2c5530;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #1f3d22; }
    button.secondary {
      background: #888;
      margin-left: 8px;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.ok { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .help {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Horizon h2.0 Helper</h1>

  <label for="backendUrl">Backend URL</label>
  <input type="text" id="backendUrl" placeholder="https://h20-backend.onrender.com">
  <div class="help">URL de ton API h2.0 (sans / final)</div>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="extension-token-...">
  <div class="help">Récupère-la dans h2.0 → Paramètres → Extension</div>

  <div>
    <button id="save">Enregistrer</button>
    <button id="test" class="secondary">Tester</button>
  </div>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
