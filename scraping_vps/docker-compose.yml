services:
  scraper:
    build: .
    container_name: horizon-scraper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"  # accessible seulement via localhost,
                                # exposé via nginx + SSL
    environment:
      SCRAPING_API_KEY: ${SCRAPING_API_KEY:?SCRAPING_API_KEY required}
      # Credentials QUB (Québecor) pour l'endpoint
      # /scrape/numeriq-comparables (comparables vendus du Journal
      # de Montréal). Optionnels au boot : si absents, l'endpoint
      # renvoie un 502 propre — il ne casse PAS le démarrage du
      # service. À renseigner dans le fichier .env du VPS une fois
      # le compte QUB obtenu.
      NUMERIQ_USERNAME: ${NUMERIQ_USERNAME:-}
      NUMERIQ_PASSWORD: ${NUMERIQ_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 1.5G  # CPX11 (2 GB) — laisse 500 MB à l'OS.
                        # Si tu upgrades à CPX21+ (4 GB), passe à 3G.
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
