# ===============================================================
# Horizon Services Immobiliers — h2.0 monorepo
# Render Blueprint (backend FastAPI + frontend Next.js + cron SEO)
# ===============================================================
#
# The existing `h2.0` web service (Python) is already deployed and
# connected to this repo. This blueprint documents the full intended
# topology. To avoid duplicating the existing service on first sync,
# the backend entry uses the same name and root directory, so Render
# treats it as an update rather than a new service.

services:
  # --------------------------------------------------------------
  # Backend — FastAPI API (already deployed at h2-0.onrender.com)
  # --------------------------------------------------------------
  - type: web
    name: h2-0
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: FRONTEND_ORIGINS
        value: "https://immohorizon.com,https://www.immohorizon.com,https://immohorizon.ca,https://www.immohorizon.ca"
      # Integrations — copied from bridge-public
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: "claude-sonnet-4-5"
      - key: MONDAY_API_TOKEN
        sync: false
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false
      - key: QBO_REFRESH_TOKEN
        sync: false
      - key: QBO_REALM_ID
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: MAIL_FROM_EMAIL
        value: "info@immohorizon.com"
      - key: MAIL_FROM_NAME
        value: "Horizon Services Immobiliers"

  # --------------------------------------------------------------
  # Frontend — Next.js 15 (public site + internal portal)
  # --------------------------------------------------------------
  - type: web
    name: h2-0-web
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SITE_URL
        value: "https://immohorizon.com"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://h2-0.onrender.com"
      - key: NEXT_PUBLIC_DEFAULT_LOCALE
        value: "fr"
      - key: NEXT_PUBLIC_SEARCH_CONSOLE_VERIFICATION
        value: "df-YUga-WwjKVQGNgHeqbykIibgxiav5Wq4WbetFrMc"

  # --------------------------------------------------------------
  # Cron — daily SEO article generation via Claude API
  # --------------------------------------------------------------
  - type: cron
    name: h2-0-seo-daily
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    branch: main
    schedule: "0 11 * * *"   # 07:00 America/Montreal (11:00 UTC)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.jobs.seo_daily
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: "claude-sonnet-4-5"
      - key: SITE_URL
        value: "https://immohorizon.com"

  # --------------------------------------------------------------
  # Cron — daily unpaid-invoice reminders via Microsoft Graph
  # --------------------------------------------------------------
  - type: cron
    name: h2-0-facture-reminders
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    branch: main
    schedule: "30 12 * * *"   # 08:30 America/Montreal (12:30 UTC)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.jobs.facture_reminders
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: MAIL_FROM_EMAIL
        value: "info@immohorizon.com"
      - key: MAIL_FROM_NAME
        value: "Horizon Services Immobiliers"

  # --------------------------------------------------------------
  # Cron — hourly follow-up reminders (notif cloche) :
  #   - relances de suivi en retard (overdue)
  #   - prospects créés depuis +24 h sans aucun contact
  # Pas de courriel, juste la notification dans l'app.
  # --------------------------------------------------------------
  - type: cron
    name: h2-0-follow-up-reminders
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    branch: main
    schedule: "0 * * * *"   # toutes les heures, à la minute :00
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.jobs.follow_up_reminders
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
